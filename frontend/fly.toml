# fly.toml app configuration file generated for nameweaver on 2026-03-29T14:02:39-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'nameweaver'
primary_region = 'gru'

[build]
  [build.args]
  VITE_API_BASE_URL = "https://nameweaver-backend.fly.dev"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
