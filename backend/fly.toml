# fly.toml app configuration file generated for nameweaver-backend on 2026-03-29T13:48:31-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'nameweaver-backend'
primary_region = 'gru'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = "requests"
    soft_limit = 25
    hard_limit = 50

[[http_service.checks]]
  grace_period = "20s"
  interval = "10s"
  timeout = "5s"
  method = "GET"
  path = "/health/"

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512